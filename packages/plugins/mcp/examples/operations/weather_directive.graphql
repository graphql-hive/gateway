query GetWeather($location: String!) {
  weather(location: $location) {
    temperature
    conditions
    humidity
    location
  }
}

query GetForecast($location: String!, $days: Int) {
  forecast(location: $location, days: $days) {
    date
    high
    low
    conditions
  }
}

query QuickWeather($location: String!)
@mcpTool(
  name: "quick_weather"
  description: "Quick weather check returns just temperature and conditions"
) {
  weather(location: $location) {
    temperature
    conditions
  }
}

query QuickWeatherProvider($location: String!)
@mcpTool(
  name: "quick_weather"
  description: "Quick weather check"
  descriptionProvider: "langfuse:get_weather_description"
) {
  weather(location: $location) {
    temperature
    conditions
  }
}

query MetaWeather($location: String!)
@mcpTool(
  name: "meta_weather"
  description: "Weather with metadata from directive"
  meta: { entitlement: "weather_access", tags: ["read", "public"], version: 2 }
) {
  weather(location: $location) {
    temperature
    conditions
  }
}

query CompanyInfo($companyId: String! @mcpHeader(name: "x-company-id"))
@mcpTool(
  name: "company_info"
  description: "Get info about the authenticated company"
) {
  company(companyId: $companyId) {
    id
    name
    plan
  }
}

query WeatherWithFieldProvider(
  $location: String! @mcpDescription(provider: "langfuse:weather.location:3")
  $days: Int
)
@mcpTool(
  name: "weather_field_provider"
  description: "Weather with Langfuse-managed field descriptions"
) {
  forecast(location: $location, days: $days) {
    date
    high
    low
    conditions @mcpDescription(provider: "langfuse:forecast.conditions")
  }
}
